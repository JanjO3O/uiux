<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 외부라이브러리 파일 연결 -->
     <script src="js/jquery-3.7.1.min.js"></script>
     <script src="js/swiper-bundle.min.js"></script>
     <link rel="stylesheet" href="css/swiper-bundle.min.css">
     
     <!-- 내가 만든 파일 연결 -->
      <script src="js/main.js"></script>
    <link rel="stylesheet" href="css/main.css">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <title>을유문화사</title>
</head>
<body>
    <div id="wrap">
        <header class="header"></header><!--//header-->
        <main class="container">
            <section class="visual">
                <h2 class="sr-only">팝업</h2><!-- 하나의 섹션 안에 h2태그는 하나밖에 들어갈 수 없기에 -->
                <div class="swiper"> <!-- 팝업의 높이와 넓이를 css에서 줄 수 있는 요소-->
                    <ul class="swiper-wrapper"> <!-- 각 팝업 콘텐츠를 감싸는 요소-->
                        <li class="swiper-slide bg1">
                            <h3>시대를 읽는 가장 깊은 시선</h3>
                            <p>을유문화사, 당신의 서재에 가치를 더합니다.</p>
                        </li> <!-- 팝업 요소들 (div로 해도 상관없음)-->
                        <li class="swiper-slide bg2">
                            <h3>전통 위에서 미래를 쓰다</h3>
                            <p>80년의 깊이로 오늘의 문장을 발견하는 시간.</p>
                        </li>
                        <li class="swiper-slide bg3">
                            <h3>고전의 품격, 오늘의 감각</h3>
                            <p>시간이 증명한 텍스트, 새로운 디자인으로 만나다.</p>
                        </li>
                    </ul>
                </div><!--//swiper-->
                <div class="ctrl_left">
                    <div class="bar"></div><!--//bar-->
                    <button class="stop">
                        <span class="sr-only">일시정지</span>
                        <svg width="10" height="11" viewBox="0 0 10 11" xmlns="http://www.w3.org/2000/svg">
                            <path d="M6.73913 11V0H10V11H6.73913ZM0 11V0H3.26087V11H0Z"/>
                        </svg>
                    </button><!--//stop-->
                    <button class="play">
                        <span class="sr-only">다시시작</span>
                        <svg width="9" height="11" viewBox="0 0 9 11" xmlns="http://www.w3.org/2000/svg">
                            <path d="M0 11V0L9 5.5L0 11Z"/>
                        </svg>
                    </button><!--//play-->
                </div><!--//ctrl_left-->
                <div class="ctrl_right">
                    <button class="prev">
                        <span class="sr-only">이전팝업보기</span>
                        <svg width="16" height="12" viewBox="0 0 16 12" xmlns="http://www.w3.org/2000/svg">
                            <path d="M6 12L0 6L6 0L7.4 1.45L3.85 5H16V7H3.85L7.4 10.55L6 12Z"/>
                        </svg>
                    </button><!--//prev-->
                    <button class="next">
                        <span class="sr-only">다음팝업보기</span>
                        <svg width="16" height="12" viewBox="0 0 16 12" xmlns="http://www.w3.org/2000/svg">
                            <path d="M10 -5.24537e-07L16 6L10 12L8.6 10.55L12.15 7L4.37114e-07 7L6.11959e-07 5L12.15 5L8.6 1.45L10 -5.24537e-07Z"/>
                        </svg>
                    </button><!--//next-->
                </div><!--//ctrl_right-->
            </section><!--//visual-->
            <section class="book"></section><!--//book-->
            <section class="interview"></section><!--//interview-->
            <section class="story"></section><!--//story-->
        </main><!--//container-->
        <footer class="footer"></footer><!--//footer-->
    </div>
</body>
</html>
